</head>
<body>

            <nav class="nav-links">

    <!-- ENVOLTORIO MAESTRO DE CONTROL -->
    <div class="login-page-wrapper">
        <main class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Iniciar Sesión</h2>
                    <p>Ingresa tus credenciales para gestionar tus citas y cotizaciones</p>
                </div>

                <div id="status-message" class="status-msg" style="display: none;"></div>

                <form class="auth-form" id="form-login">
                    <div class="form-group">
                        <label for="correo">Correo Electrónico</label>
                        <input type="email" id="correo" placeholder="tu@correo.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-submit" id="btn-submit">Ingresar</button>
                </form>

                <div class="auth-footer">
                    <p>¿No tienes cuenta? <a href="registrarse.html">Regístrate aquí</a></p>
                </div>
            </div>
        </main>
    </div>

    <!-- FOOTER ANCLADO Y CORREGIDO -->
    <footer class="site-footer">
        <div class="footer-logo-container">

        </div>
        <p class="footer-copyright">&copy; 2026 DetailingYali. Todos los derechos reservados.</p>
    </footer>

</body>
</html>         

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const loginForm = document.getElementById('form-login');
        const statusMessage = document.getElementById('status-message');
        const btnSubmit = document.getElementById('btn-submit');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const correo = document.getElementById('correo').value.trim();
            const password = document.getElementById('password').value.trim();

            statusMessage.style.display = 'none';
            statusMessage.className = 'status-msg';

            if (!correo || !password) {
                showStatus('Por favor, rellena todos los campos.', 'error');
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.textContent = 'Verificando...';

            try {
                const response = await fetch('login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, password })
                });

                const resultado = await response.json();

                if (response.ok && resultado.status === 'success') {
                    
                    // ALMACENAMIENTO SEGURO DE VARIABLES GLOBALES DE SESIÓN
                    localStorage.setItem('usuario_id', resultado.id);
                    localStorage.setItem('usuario_logeado', resultado.nombre);
                    localStorage.setItem('usuario_rol', resultado.rol); 
                    // CAMBIO CLAVE: Guarda el correo para que reservar_cita.html funcione al 100%
                    localStorage.setItem('usuario_logeado_correo', resultado.correo);
                    
                    showStatus('¡Inicio de sesión correcto! Redirigiendo...', 'success');
                    loginForm.reset();

                    // REDIRECCIÓN INTELIGENTE ASOCIADA A TUS ARCHIVOS REALES
                    setTimeout(() => {
                        if (resultado.rol === 'admin') {
                            window.location.href = 'admin.html';       
                        } else if (resultado.rol === 'trabajador') {
                            // CORRECCIÓN: Apunta al nombre exacto de tu archivo del operario
                            window.location.href = 'panel_trabajador.html';  
                        } else {
                            window.location.href = 'index.html';       
                        }
                    }, 1500);
                    
                } else {
                    showStatus(resultado.message || 'Credenciales de acceso incorrectas.', 'error');
                    btnSubmit.disabled = false;
                    btnSubmit.textContent = 'Ingresar';
                }
            } catch (error) {
                showStatus('No se pudo conectar con el servidor de la base de datos.', 'error');
                btnSubmit.disabled = false;
                btnSubmit.textContent = 'Ingresar';
            }
        });

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.style.display = 'block';
            statusMessage.className = 'status-msg ' + type;
        }
    });
    </script>
</body>
