<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - AutoDetailPro</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="registrarse.css">
</head>
<body>

    <!-- BARRA DE NAVEGACIÓN -->
    <header class="navbar-wrapper">
        <div class="navbar-container">
            <div class="logo">
                <span>AutoDetailPro</span>
            </div>
            <nav class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="servicios.html">Servicios</a>
                <a href="paquetes.html">Paquetes</a>
                <a href="galeria.html">Galería</a>
            </nav>
        </div>
    </header>

    <!-- CONTENEDOR CENTRAL DEL REGISTRO -->
    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Regístrate</h2>
                <p>Crea tu cuenta para gestionar tus citas y cotizaciones</p>
            </div>

            <div id="status-message" class="status-msg" style="display: none;"></div>

            <form class="auth-form" id="form-registro">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Tu nombre" required>
                </div>

                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" placeholder="Tu apellido" required>
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" placeholder="Ej: 7221234567" required>
                </div>

                <div class="form-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" placeholder="Ej: Toluca Edomex" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required style="width: 100%; padding: 0.9rem 1.2rem; border-radius: 12px; background: #05070f; color: #fff; border: 1px solid #161b30; outline: none;">
                </div>

                <button type="submit" class="btn-submit" id="btn-submit">Registrarme</button>
            </form>

            <div class="auth-footer">
                <p>¿Ya tienes cuenta? <a href="login.html" style="color: #00b4db; font-weight: 700; text-decoration: none;">Inicia sesión aquí</a></p>
            </div>
        </div>
    </main>

    <!-- PIE DE PÁGINA -->
    <footer class="site-footer">
        <div class="footer-logo-container">
            <span class="footer-logo-text">🧼 DetailingYali</span>
        </div>
        <p>&copy; 2026 AutoDetailPro. Todos los derechos reservados.</p>
    </footer>

    <script>
   document.addEventListener('DOMContentLoaded', () => {
    const registroForm = document.getElementById('form-registro');
    const statusMessage = document.getElementById('status-message');
    const btnSubmit = document.getElementById('btn-submit');

    registroForm.addEventListener('submit', async (e) => {
        e.preventDefault(); 

        const nombre = document.getElementById('nombre').value.trim();
        const apellido = document.getElementById('apellido').value.trim();
        const telefono = document.getElementById('telefono').value.trim();
        const correo = document.getElementById('correo').value.trim().toLowerCase();
        const direccion = document.getElementById('direccion').value.trim();
        const password = document.getElementById('password').value.trim();

        statusMessage.style.display = 'none';
        statusMessage.className = 'status-msg';

        if (!nombre || !apellido || !telefono || !correo || !direccion || !password) {
            showStatus('Por favor, rellena todos los campos.', 'error');
            return;
        }

        btnSubmit.disabled = true;
        btnSubmit.textContent = 'Procesando...';

        try {
            const response = await fetch('registro.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, apellido, telefono, correo, direccion, password })
            });

            const resultado = await response.json();

            if (response.ok && resultado.status === 'success') {
                // BLOQUEO DE AUTOLOGIN: Limpiamos por completo la memoria antes del desvío
                localStorage.clear();
                sessionStorage.clear();

                showStatus(resultado.message + ' Redirigiendo al inicio de sesión...', 'success');
                registroForm.reset();

                // REDIRECCIÓN FORZADA: Te manda estrictamente a login.html
                setTimeout(() => { 
                    window.location.replace('login.html'); 
                }, 2000);
            } else {
                showStatus(resultado.message || 'Error en el registro.', 'error');
                btnSubmit.disabled = false;
                btnSubmit.textContent = 'Registrarme';
            }
        } catch (error) {
            showStatus('No se pudo establecer conexión con el servidor.', 'error');
            btnSubmit.disabled = false;
            btnSubmit.textContent = 'Registrarme';
        }
    });

    function showStatus(message, type) {
        statusMessage.textContent = message;
        statusMessage.style.display = 'block';
        statusMessage.className = 'status-msg ' + type;
    }
});

    </script>
</body>
</html>
